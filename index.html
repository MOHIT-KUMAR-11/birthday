<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --gold:#f9c74f; --rose:#f4436c; --pink:#ff87ab;
      --lavender:#c77dff; --cream:#fff8f0; --dark:#1a0a2e;
    }

    body {
      min-height:100vh; background:var(--dark);
      font-family:'Nunito',sans-serif; overflow-x:hidden;
    }

    /* ── STARS (slower) ── */
    .stars-bg { position:fixed; inset:0; z-index:0; pointer-events:none; }
    .star {
      position:absolute; border-radius:50%; background:white; opacity:0;
      animation:twinkle var(--dur,5s) ease-in-out infinite;
      animation-delay:var(--delay,0s);
    }
    @keyframes twinkle {
      0%,100%{opacity:0;transform:scale(0.5)}
      50%{opacity:1;transform:scale(1)}
    }

    /* ── CONFETTI (slower) ── */
    .confetti-container { position:fixed; inset:0; pointer-events:none; z-index:10; overflow:hidden; }
    .confetti-piece {
      position:absolute; top:-20px; left:var(--left,50%); opacity:0;
      width:var(--w,10px); height:var(--h,14px);
      background:var(--color,#f9c74f); border-radius:var(--radius,2px);
      animation:confettiFall var(--duration,9s) var(--delay,0s) ease-in infinite;
    }
    @keyframes confettiFall {
      0%  {opacity:1;top:-20px;transform:rotate(0deg) translateX(0)}
      25% {transform:rotate(90deg) translateX(30px)}
      50% {transform:rotate(180deg) translateX(-20px)}
      75% {transform:rotate(270deg) translateX(25px)}
      100%{opacity:0;top:110vh;transform:rotate(360deg) translateX(-15px)}
    }

    /* ── BALLOONS (slower) ── */
    .balloon-container { position:fixed; bottom:-200px; width:100%; pointer-events:none; z-index:5; }
    .balloon {
      position:absolute; bottom:0; left:var(--left,50%);
      border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
      animation:floatUp var(--duration,15s) var(--delay,0s) ease-in infinite;
    }
    .balloon::before {
      content:''; position:absolute; bottom:-2px; left:50%;
      transform:translateX(-50%); width:6px; height:10px;
      background:inherit; clip-path:polygon(50% 100%,0 0,100% 0);
    }
    .balloon::after {
      content:''; position:absolute; bottom:-60px; left:50%;
      width:1px; height:60px; background:rgba(255,255,255,0.4);
    }
    @keyframes floatUp {
      0%  {bottom:-200px;opacity:1;transform:translateX(0) rotate(0deg)}
      20% {transform:translateX(14px) rotate(4deg)}
      40% {transform:translateX(-10px) rotate(-4deg)}
      60% {transform:translateX(11px) rotate(3deg)}
      80% {transform:translateX(-7px) rotate(-2deg);opacity:0.8}
      100%{bottom:110vh;opacity:0;transform:translateX(5px) rotate(1deg)}
    }

    /* ── SPARKLES (slower) ── */
    .sparkle-container { position:fixed; inset:0; pointer-events:none; z-index:15; overflow:hidden; }
    .sparkle {
      position:absolute; left:var(--x,50%); top:var(--y,50%);
      width:var(--size,8px); height:var(--size,8px);
      animation:sparkleAnim var(--dur,3.5s) var(--delay,0s) ease-out infinite;
    }
    .sparkle::before,.sparkle::after {
      content:''; position:absolute; inset:0;
      background:var(--color,#f9c74f);
      clip-path:polygon(50% 0%,55% 45%,100% 50%,55% 55%,50% 100%,45% 55%,0% 50%,45% 45%);
    }
    .sparkle::after{transform:rotate(45deg);opacity:0.5}
    @keyframes sparkleAnim {
      0%  {opacity:0;transform:scale(0) rotate(0deg)}
      30% {opacity:1;transform:scale(1.2) rotate(90deg)}
      60% {opacity:0.8;transform:scale(0.9) rotate(180deg)}
      100%{opacity:0;transform:scale(0) rotate(360deg)}
    }

    /* ── RIBBON ── */
    .ribbon-banner {
      position:fixed; top:0; left:0; right:0;
      display:flex; justify-content:center; padding:10px 0;
      z-index:25; overflow:hidden;
    }
    .ribbon-flag {
      width:28px; height:20px;
      clip-path:polygon(0 0,100% 0,100% 75%,50% 100%,0 75%);
      animation:ribbonWave var(--dur,2.5s) var(--delay,0s) ease-in-out infinite;
    }
    @keyframes ribbonWave {
      0%,100%{transform:translateY(0) rotate(0)}
      50%{transform:translateY(5px) rotate(1deg)}
    }

    /* ── MAIN PAGE ── */
    .page {
      position:relative; z-index:20; min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:40px 20px 200px; text-align:center;
    }

    /* ── CAKE (slower) ── */
    .cake-wrapper {
      position:relative; margin-bottom:30px;
      animation:cakeBounce 3.5s ease-in-out infinite;
    }
    @keyframes cakeBounce {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-14px)}
    }
    .cake { font-size:90px; line-height:1; filter:drop-shadow(0 0 30px rgba(249,199,79,0.8)); }
    .cake-glow {
      position:absolute; inset:-20px; border-radius:50%;
      background:radial-gradient(circle,rgba(249,199,79,0.3) 0%,transparent 70%);
      animation:glowPulse 3.5s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100%{opacity:0.5;transform:scale(1)}
      50%{opacity:1;transform:scale(1.15)}
    }

    /* ── TITLES ── */
    .main-title {
      font-family:'Great Vibes',cursive;
      font-size:clamp(52px,10vw,96px);
      background:linear-gradient(135deg,var(--gold) 0%,var(--pink) 50%,var(--lavender) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      line-height:1.1; margin-bottom:10px;
      animation:titleReveal 2s ease-out forwards;
      filter:drop-shadow(0 0 20px rgba(249,199,79,0.4));
    }
    @keyframes titleReveal {
      from{opacity:0;transform:scale(0.8) translateY(30px)}
      to{opacity:1;transform:scale(1) translateY(0)}
    }
    .name-title {
      font-family:'Great Vibes',cursive;
      font-size:clamp(40px,8vw,72px); color:var(--cream);
      text-shadow:0 0 30px rgba(255,135,171,0.8),0 0 60px rgba(249,199,79,0.4);
      margin-bottom:24px;
      animation:nameGlow 4.5s ease-in-out infinite;
    }
    @keyframes nameGlow {
      0%,100%{text-shadow:0 0 30px rgba(255,135,171,0.8),0 0 60px rgba(249,199,79,0.4)}
      50%{text-shadow:0 0 50px rgba(255,135,171,1),0 0 100px rgba(249,199,79,0.8),0 0 150px rgba(199,125,255,0.5)}
    }

    .message-box {
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(20px); border-radius:24px;
      padding:28px 40px; max-width:560px; margin:0 auto 32px;
      animation:fadeSlideUp 2s ease-out 0.5s both;
    }
    @keyframes fadeSlideUp {
      from{opacity:0;transform:translateY(40px)}
      to{opacity:1;transform:translateY(0)}
    }
    .message-text { color:rgba(255,255,255,0.85); font-size:17px; font-weight:300; line-height:1.9; }

    /* ── EMOJIS (slower) ── */
    .emoji-row {
      display:flex; gap:16px; justify-content:center; flex-wrap:wrap;
      margin-bottom:28px; animation:fadeSlideUp 2s ease-out 0.8s both;
    }
    .emoji-item {
      font-size:32px;
      animation:emojiBounce var(--dur,2.8s) var(--delay,0s) ease-in-out infinite;
    }
    @keyframes emojiBounce {
      0%,100%{transform:translateY(0) rotate(0)}
      25%{transform:translateY(-12px) rotate(-4deg)}
      75%{transform:translateY(-7px) rotate(4deg)}
    }

    /* ── SURPRISE BUTTON ── */
    .surprise-btn {
      background:linear-gradient(135deg,#f9c74f,#f4436c,#c77dff);
      background-size:200% 200%;
      border:none; color:white;
      font-family:'Nunito',sans-serif; font-size:18px; font-weight:700;
      padding:18px 52px; border-radius:50px; cursor:pointer;
      letter-spacing:1.5px; text-transform:uppercase;
      box-shadow:0 8px 40px rgba(244,67,108,0.5);
      transition:all 0.4s ease;
      animation:fadeSlideUp 2s ease-out 1s both, btnGradient 5s ease infinite;
      position:relative; overflow:hidden;
    }
    @keyframes btnGradient {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }
    .surprise-btn:hover { transform:scale(1.08); box-shadow:0 16px 60px rgba(244,67,108,0.7); }
    .surprise-btn:active { transform:scale(0.96); }
    .btn-ripple {
      position:absolute; border-radius:50%;
      background:rgba(255,255,255,0.3); transform:scale(0);
      animation:ripple 0.7s linear; pointer-events:none;
    }
    @keyframes ripple { to{transform:scale(4);opacity:0} }

    /* ══════════════════════════════════════════════════════════════
       SURPRISE OVERLAY
    ══════════════════════════════════════════════════════════════ */
    .surprise-overlay {
      position:fixed; inset:0; z-index:100;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-start;
      padding:60px 20px 60px;
      background:rgba(8,2,20,0.97);
      backdrop-filter:blur(14px);
      opacity:0; pointer-events:none;
      transition:opacity 0.9s ease;
      overflow-y:auto;
    }
    .surprise-overlay.active { opacity:1; pointer-events:all; }

    /* Close */
    .close-btn {
      position:fixed; top:18px; right:22px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18);
      color:white; width:44px; height:44px;
      border-radius:50%; font-size:18px; cursor:pointer;
      z-index:110; display:flex; align-items:center; justify-content:center;
      transition:all 0.3s ease; opacity:0;
    }
    .close-btn.visible { opacity:1; transition:opacity 0.6s ease 1.2s; }
    .close-btn:hover { background:rgba(255,255,255,0.2); transform:rotate(90deg) scale(1.1); }

    /* Envelope */
    .envelope-wrap { margin-bottom:36px; animation:envelopePop 1.2s ease-out both; }
    @keyframes envelopePop {
      0%  {opacity:0;transform:scale(0.2) rotate(-12deg)}
      60% {transform:scale(1.18) rotate(4deg)}
      100%{opacity:1;transform:scale(1) rotate(0)}
    }
    .envelope-emoji {
      font-size:76px; display:block;
      filter:drop-shadow(0 0 30px rgba(249,199,79,0.9));
      animation:envFloat 3.5s ease-in-out infinite;
    }
    @keyframes envFloat {
      0%,100%{transform:translateY(0) rotate(-2deg)}
      50%{transform:translateY(-12px) rotate(2deg)}
    }

    /* Overlay heading */
    .overlay-title {
      font-family:'Great Vibes',cursive;
      font-size:clamp(32px,6vw,52px);
      background:linear-gradient(135deg,var(--gold),var(--pink));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:32px; opacity:0;
      animation:fadeSlideUp 1s ease-out 0.5s both;
    }

    /* Message cards */
    .messages-container { display:flex; flex-direction:column; gap:18px; max-width:640px; width:100%; }

    .msg-card {
      background:rgba(255,255,255,0.055);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:22px; padding:26px 32px;
      opacity:0; transform:translateY(28px) scale(0.97);
      transition:opacity 0.8s ease, transform 0.8s ease;
      position:relative; overflow:hidden; text-align:left;
    }
    .msg-card.show { opacity:1; transform:translateY(0) scale(1); }
    .msg-card::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:linear-gradient(135deg,var(--c1,rgba(249,199,79,0.06)),var(--c2,rgba(244,67,108,0.04)));
    }

    .msg-icon { font-size:32px; margin-bottom:10px; display:block; }
    .msg-text { font-size:16px; font-weight:300; color:rgba(255,255,255,0.88); line-height:1.9; }
    .msg-text strong { color:var(--pink); font-weight:700; }

    /* Final heart */
    .heart-line {
      margin-top:38px; font-size:28px; letter-spacing:8px;
      opacity:0; transition:opacity 1.2s ease;
      animation:heartBeat 2s ease-in-out infinite;
    }
    .heart-line.show { opacity:1; }
    @keyframes heartBeat {
      0%,100%{transform:scale(1)}
      14%{transform:scale(1.22)}
      28%{transform:scale(1)}
      42%{transform:scale(1.12)}
      70%{transform:scale(1)}
    }

    .sign-off {
      font-family:'Great Vibes',cursive; font-size:40px;
      background:linear-gradient(135deg,var(--gold),var(--pink));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      opacity:0; transition:opacity 1.2s ease 0.5s;
      margin-top:8px; margin-bottom:20px;
    }
    .sign-off.show { opacity:1; }

    /* ── FIREWORKS ── */
    .firework { position:fixed; pointer-events:none; z-index:50; }
    .firework-particle {
      position:absolute; border-radius:50%; top:0; left:0;
      animation:fireworkBurst 1.5s ease-out forwards; transform-origin:0 0;
    }
    @keyframes fireworkBurst {
      0%  {opacity:1;transform:translate(0,0) scale(1)}
      80% {opacity:0.8}
      100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.2)}
    }

    /* ══════════════════════════════════════════════════════════════
       FLOWER MODULE — SEPARATE
    ══════════════════════════════════════════════════════════════ */
    .flower-layer { position:fixed; bottom:0; left:0; width:100%; height:220px; pointer-events:none; z-index:8; overflow:visible; }

    .flower {
      position:absolute; bottom:0; left:var(--fl,10%);
      display:flex; flex-direction:column; align-items:center;
      animation:flowerSway var(--sway-dur,7s) var(--sway-delay,0s) ease-in-out infinite;
      transform-origin:bottom center;
    }
    .flower-stem {
      width:3px; height:var(--stem-h,100px);
      background:linear-gradient(to top,#3d9970,#27ae60);
      border-radius:2px; position:relative;
    }
    .flower-stem::before,.flower-stem::after {
      content:''; position:absolute; width:18px; height:10px;
      background:#27ae60; border-radius:50% 0 50% 0;
    }
    .flower-stem::before { top:40%; left:2px;  transform:rotate(30deg); }
    .flower-stem::after  { top:60%; right:2px; transform:rotate(-30deg) scaleX(-1); }
    .flower-head { position:relative; width:var(--head-size,40px); height:var(--head-size,40px); margin-bottom:-2px; }
    .petal {
      position:absolute; width:44%; height:52%;
      border-radius:50%; background:var(--petal-color,#ff87ab);
      top:50%; left:50%; transform-origin:bottom center; opacity:0.9;
      animation:petalBloom 2.2s ease-out var(--bloom-delay,0s) both;
    }
    .petal:nth-child(1){transform:translate(-50%,-100%) rotate(0deg)}
    .petal:nth-child(2){transform:translate(-50%,-100%) rotate(45deg)}
    .petal:nth-child(3){transform:translate(-50%,-100%) rotate(90deg)}
    .petal:nth-child(4){transform:translate(-50%,-100%) rotate(135deg)}
    .petal:nth-child(5){transform:translate(-50%,-100%) rotate(180deg)}
    .petal:nth-child(6){transform:translate(-50%,-100%) rotate(225deg)}
    .petal:nth-child(7){transform:translate(-50%,-100%) rotate(270deg)}
    .petal:nth-child(8){transform:translate(-50%,-100%) rotate(315deg)}
    @keyframes petalBloom {
      from{opacity:0;transform:translate(-50%,-100%) rotate(var(--r,0deg)) scale(0)}
      to{opacity:0.9;transform:translate(-50%,-100%) rotate(var(--r,0deg)) scale(1)}
    }
    .flower-center {
      position:absolute; width:35%; height:35%; top:50%; left:50%;
      transform:translate(-50%,-50%); border-radius:50%;
      background:var(--center-color,#f9c74f); z-index:2;
      box-shadow:0 0 8px rgba(249,199,79,0.8);
    }
    @keyframes flowerSway {
      0%  {transform:rotate(0deg)}
      25% {transform:rotate(var(--sway,4deg))}
      75% {transform:rotate(calc(var(--sway,4deg)*-1))}
      100%{transform:rotate(0deg)}
    }
    .drifting-petal {
      position:fixed; border-radius:50% 0 50% 0;
      width:var(--size,12px); height:var(--size,12px);
      background:var(--color,#ff87ab); opacity:0;
      pointer-events:none; z-index:9; left:var(--left,50%); bottom:0;
      animation:petalDrift var(--dur,11s) var(--delay,0s) ease-in-out infinite;
    }
    @keyframes petalDrift {
      0%  {opacity:0;bottom:0;transform:rotate(0deg) translateX(0)}
      10% {opacity:0.9}
      50% {transform:rotate(180deg) translateX(40px)}
      80% {opacity:0.6}
      100%{opacity:0;bottom:80vh;transform:rotate(360deg) translateX(-30px)}
    }
    /* END FLOWER MODULE */
  </style>
</head>
<body>

  <div class="stars-bg" id="stars"></div>
  <div class="confetti-container" id="confetti"></div>
  <div class="sparkle-container" id="sparkles"></div>
  <div class="balloon-container" id="balloons"></div>
  <div class="ribbon-banner" id="ribbon"></div>

  <!-- MAIN PAGE -->
  <div class="page">
    <div class="cake-wrapper">
      <div class="cake-glow"></div>
      <div class="cake">🎂</div>
    </div>
    <h1 class="main-title">Happy Birthday</h1>
    <h2 class="name-title">To You! 🎉</h2>
    <div class="message-box">
      <p class="message-text">
        May this special day bring you endless joy,<br/>
        laughter, and the most beautiful memories. 🌸<br/><br/>
        Wishing you all the happiness your heart can hold —<br/>
        today, tomorrow, and always. 💫
      </p>
    </div>
    <div class="emoji-row">
      <span class="emoji-item" style="--dur:2.8s;--delay:0s">🎁</span>
      <span class="emoji-item" style="--dur:3.2s;--delay:0.3s">🎊</span>
      <span class="emoji-item" style="--dur:2.6s;--delay:0.6s">✨</span>
      <span class="emoji-item" style="--dur:3.5s;--delay:0.1s">🎈</span>
      <span class="emoji-item" style="--dur:3s;--delay:0.4s">🌟</span>
      <span class="emoji-item" style="--dur:2.8s;--delay:0.7s">🍰</span>
      <span class="emoji-item" style="--dur:3.2s;--delay:0.2s">🎶</span>
    </div>
    <button class="surprise-btn" id="surpriseBtn" onclick="openSurprise(event)">
      🎁 &nbsp; Open Your Surprise
    </button>
  </div>

  <!-- FLOWERS -->
  <div class="flower-layer" id="flower-layer"></div>
  <div id="drifting-petals"></div>

  <!-- SURPRISE OVERLAY -->
  <div class="surprise-overlay" id="surpriseOverlay">
    <button class="close-btn" id="closeBtn" onclick="closeSurprise()">✕</button>
    <div class="envelope-wrap"><span class="envelope-emoji">💌</span></div>
    <h2 class="overlay-title">A little something just for you…</h2>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="heart-line" id="heartLine">💛 &nbsp; 🌸 &nbsp; 💜 &nbsp; 🌸 &nbsp; 💛</div>
    <div class="sign-off" id="signOff">With all my love ✨</div>
  </div>

  <script>
    /* ── SURPRISE MESSAGES ── */
    const MESSAGES = [
      {
        icon: '🌟',
        text: `Today the world became a <strong>brighter, warmer place</strong> — because you were born into it. Every single day you exist is a quiet miracle, and a gift to everyone lucky enough to know you.`,
        c1: 'rgba(249,199,79,0.08)', c2: 'rgba(255,135,171,0.04)'
      },
      {
        icon: '🌸',
        text: `You carry this <strong>rare, beautiful light</strong> inside you — the kind that makes rooms feel warmer and people feel seen. Never underestimate how deeply your presence changes everything around you.`,
        c1: 'rgba(255,135,171,0.08)', c2: 'rgba(199,125,255,0.04)'
      },
      {
        icon: '💫',
        text: `On this special day, let this be your reminder — <strong>you are enough. You have always been enough.</strong> Every laugh you've shared, every kindness you've given, every moment of yourself — it means more than words could ever say.`,
        c1: 'rgba(199,125,255,0.08)', c2: 'rgba(67,217,164,0.04)'
      },
      {
        icon: '🎂',
        text: `Another beautiful year around the sun, and look how <strong>gracefully, courageously you've grown.</strong> The hard days you've carried, the storms you've walked through — they didn't break you. They made you extraordinary.`,
        c1: 'rgba(244,67,108,0.08)', c2: 'rgba(249,199,79,0.04)'
      },
      {
        icon: '💖',
        text: `May this birthday be the first page of your <strong>most wonderful chapter yet.</strong> May you wake up every single morning feeling loved, inspired, and full of hope — because something truly magical is quietly making its way to you.`,
        c1: 'rgba(255,135,171,0.1)', c2: 'rgba(249,199,79,0.05)'
      },
      {
        icon: '🌈',
        text: `Here's to <strong>all of you</strong> — your dreams, your laugh, your tender heart, your beautiful mess. May this year give you everything you've been quietly wishing for… and so much more than you ever thought to ask. 🎉`,
        c1: 'rgba(67,217,164,0.08)', c2: 'rgba(144,224,239,0.05)'
      },
    ];

    function openSurprise(e) {
      const btn = e.currentTarget;
      const ripple = document.createElement('span');
      ripple.className = 'btn-ripple';
      const size = Math.max(btn.offsetWidth, btn.offsetHeight) * 2;
      const rect = btn.getBoundingClientRect();
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);

      const overlay = document.getElementById('surpriseOverlay');
      overlay.classList.add('active');
      document.getElementById('closeBtn').classList.add('visible');

      const container = document.getElementById('messagesContainer');
      container.innerHTML = '';

      MESSAGES.forEach((msg, i) => {
        const card = document.createElement('div');
        card.className = 'msg-card';
        card.style.setProperty('--c1', msg.c1);
        card.style.setProperty('--c2', msg.c2);
        card.innerHTML = `<span class="msg-icon">${msg.icon}</span><p class="msg-text">${msg.text}</p>`;
        container.appendChild(card);
        setTimeout(() => card.classList.add('show'), 700 + i * 600);
      });

      const finalDelay = 700 + MESSAGES.length * 600 + 500;
      setTimeout(() => {
        document.getElementById('heartLine').classList.add('show');
        document.getElementById('signOff').classList.add('show');
        launchFireworks();
        setTimeout(launchFireworks, 1200);
      }, finalDelay);
    }

    function closeSurprise() {
      document.getElementById('surpriseOverlay').classList.remove('active');
      document.getElementById('closeBtn').classList.remove('visible');
      document.querySelectorAll('.msg-card').forEach(c => c.classList.remove('show'));
      document.getElementById('heartLine').classList.remove('show');
      document.getElementById('signOff').classList.remove('show');
    }

    /* ── STARS ── */
    (function(){
      const c=document.getElementById('stars');
      for(let i=0;i<120;i++){
        const s=document.createElement('div');
        s.className='star';
        const sz=Math.random()*3+1;
        s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*4+4}s;--delay:${Math.random()*7}s;`;
        c.appendChild(s);
      }
    })();

    /* ── CONFETTI ── */
    (function(){
      const c=document.getElementById('confetti');
      const colors=['#f9c74f','#f4436c','#ff87ab','#c77dff','#90e0ef','#43d9a4','#fff'];
      const shapes=['2px','50%','0'];
      for(let i=0;i<65;i++){
        const p=document.createElement('div');
        p.className='confetti-piece';
        p.style.cssText=`--left:${Math.random()*100}%;--color:${colors[i%colors.length]};--w:${Math.random()*10+6}px;--h:${Math.random()*14+6}px;--radius:${shapes[i%3]};--duration:${Math.random()*5+8}s;--delay:${Math.random()*10}s;`;
        c.appendChild(p);
      }
    })();

    /* ── BALLOONS ── */
    (function(){
      const c=document.getElementById('balloons');
      const colors=['#f4436c','#f9c74f','#c77dff','#ff87ab','#43d9a4','#90e0ef','#ff6b6b','#ffd93d'];
      for(let i=0;i<12;i++){
        const b=document.createElement('div');
        b.className='balloon';
        b.style.cssText=`--left:${Math.random()*92}%;background:${colors[i%colors.length]};--duration:${Math.random()*6+13}s;--delay:${Math.random()*14}s;width:${Math.random()*20+50}px;height:${Math.random()*25+60}px;`;
        c.appendChild(b);
      }
    })();

    /* ── SPARKLES ── */
    (function(){
      const c=document.getElementById('sparkles');
      const colors=['#f9c74f','#fff','#ff87ab','#c77dff','#43d9a4'];
      for(let i=0;i<26;i++){
        const s=document.createElement('div');
        s.className='sparkle';
        const sz=Math.random()*12+6;
        s.style.cssText=`--x:${Math.random()*100}%;--y:${Math.random()*80}%;--size:${sz}px;--color:${colors[i%colors.length]};--dur:${Math.random()*2.5+3}s;--delay:${Math.random()*7}s;`;
        c.appendChild(s);
      }
    })();

    /* ── RIBBON ── */
    (function(){
      const c=document.getElementById('ribbon');
      const colors=['#f4436c','#f9c74f','#c77dff','#ff87ab','#43d9a4','#90e0ef'];
      for(let i=0;i<60;i++){
        const f=document.createElement('div');
        f.className='ribbon-flag';
        f.style.cssText=`background:${colors[i%colors.length]};--dur:${Math.random()*1.5+2.2}s;--delay:${(i*0.06)%1.4}s;`;
        c.appendChild(f);
      }
    })();

    /* ── FIREWORKS ── */
    function launchFireworks(){
      const colors=['#f9c74f','#f4436c','#c77dff','#ff87ab','#43d9a4','#fff','#90e0ef'];
      for(let f=0;f<7;f++){
        setTimeout(()=>{
          const x=Math.random()*window.innerWidth;
          const y=Math.random()*window.innerHeight*0.65+40;
          const fw=document.createElement('div');
          fw.className='firework';
          fw.style.cssText=`left:${x}px;top:${y}px;`;
          for(let p=0;p<28;p++){
            const angle=(360/28)*p;
            const dist=Math.random()*90+60;
            const rad=angle*Math.PI/180;
            const part=document.createElement('div');
            part.className='firework-particle';
            part.style.cssText=`background:${colors[p%colors.length]};--tx:${Math.cos(rad)*dist}px;--ty:${Math.sin(rad)*dist}px;width:${Math.random()*5+4}px;height:${Math.random()*5+4}px;animation-duration:${Math.random()*0.6+1.1}s;animation-delay:${Math.random()*0.3}s;`;
            fw.appendChild(part);
          }
          document.body.appendChild(fw);
          setTimeout(()=>fw.remove(),2200);
        },f*320);
      }
    }

    /* ══════════════════════════════════════════════════════════════
       FLOWER MODULE — SELF-CONTAINED
    ══════════════════════════════════════════════════════════════ */
    (function FlowerModule(){
      const CFG=[
        {left:'3%', stemH:90, headSize:38,petalColor:'#ff87ab',centerColor:'#f9c74f',sway:'5deg', swayDur:'7s',  swayDelay:'0s',  bloomDelay:0.2},
        {left:'9%', stemH:120,headSize:46,petalColor:'#c77dff',centerColor:'#fff',   sway:'4deg', swayDur:'8.5s',swayDelay:'1s',  bloomDelay:0.5},
        {left:'17%',stemH:80, headSize:34,petalColor:'#f9c74f',centerColor:'#f4436c',sway:'6deg', swayDur:'7.5s',swayDelay:'0.4s',bloomDelay:0.3},
        {left:'25%',stemH:110,headSize:42,petalColor:'#ff6b9d',centerColor:'#f9c74f',sway:'3deg', swayDur:'9s',  swayDelay:'1.8s',bloomDelay:0.7},
        {left:'33%',stemH:95, headSize:40,petalColor:'#43d9a4',centerColor:'#fff',   sway:'5deg', swayDur:'7s',  swayDelay:'0.6s',bloomDelay:0.6},
        {left:'58%',stemH:100,headSize:42,petalColor:'#90e0ef',centerColor:'#f9c74f',sway:'4deg', swayDur:'8s',  swayDelay:'1.2s',bloomDelay:0.8},
        {left:'66%',stemH:85, headSize:36,petalColor:'#ff87ab',centerColor:'#c77dff',sway:'6deg', swayDur:'6.5s',swayDelay:'0.3s',bloomDelay:0.4},
        {left:'74%',stemH:115,headSize:44,petalColor:'#ffd93d',centerColor:'#f4436c',sway:'3.5deg',swayDur:'8.5s',swayDelay:'1.5s',bloomDelay:0.9},
        {left:'82%',stemH:90, headSize:38,petalColor:'#c77dff',centerColor:'#43d9a4',sway:'5deg', swayDur:'7.2s',swayDelay:'0.8s',bloomDelay:0.5},
        {left:'90%',stemH:105,headSize:40,petalColor:'#ff87ab',centerColor:'#f9c74f',sway:'4.5deg',swayDur:'8s', swayDelay:'1.1s',bloomDelay:0.7},
        {left:'96%',stemH:78, headSize:32,petalColor:'#f4436c',centerColor:'#fff',   sway:'6deg', swayDur:'6.8s',swayDelay:'0.5s',bloomDelay:0.2},
      ];

      function makeFlower(cfg){
        const f=document.createElement('div');
        f.className='flower';
        f.style.cssText=`--fl:${cfg.left};--sway:${cfg.sway};--sway-dur:${cfg.swayDur};--sway-delay:${cfg.swayDelay};`;
        const stem=document.createElement('div');
        stem.className='flower-stem'; stem.style.height=cfg.stemH+'px';
        const head=document.createElement('div');
        head.className='flower-head';
        head.style.cssText=`--head-size:${cfg.headSize}px;width:${cfg.headSize}px;height:${cfg.headSize}px;`;
        for(let p=0;p<8;p++){
          const petal=document.createElement('div');
          petal.className='petal';
          petal.style.cssText=`--petal-color:${cfg.petalColor};--bloom-delay:${cfg.bloomDelay+p*0.1}s;`;
          head.appendChild(petal);
        }
        const center=document.createElement('div');
        center.className='flower-center';
        center.style.setProperty('--center-color',cfg.centerColor);
        head.appendChild(center);
        f.appendChild(head); f.appendChild(stem);
        return f;
      }

      const layer=document.getElementById('flower-layer');
      CFG.forEach(cfg=>layer.appendChild(makeFlower(cfg)));

      const drift=document.getElementById('drifting-petals');
      const pc=['#ff87ab','#c77dff','#f9c74f','#43d9a4','#ffd93d','#90e0ef','#f4436c'];
      for(let i=0;i<22;i++){
        const dp=document.createElement('div');
        dp.className='drifting-petal';
        const sz=Math.random()*10+8;
        dp.style.cssText=`--left:${Math.random()*55+5}%;--color:${pc[i%pc.length]};--size:${sz}px;--dur:${Math.random()*5+10}s;--delay:${Math.random()*9}s;`;
        drift.appendChild(dp);
      }
    })();
    /* END FLOWER MODULE */

    setTimeout(launchFireworks, 2500);
    setTimeout(launchFireworks, 6000);
  </script>
</body>
